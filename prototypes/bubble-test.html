<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test bulles transparentes — esprit Loud</title>
<style>
  html,body{ margin:0; padding:0; }
  body{
    min-height:100vh;
    background:#0b1f2a;
    color:#eef6f4;
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; flex-direction:column; align-items:center; gap:28px;
    padding:40px 20px;
  }
  h1{ font-size:14px; text-transform:uppercase; letter-spacing:0.6px; color:#9fb8bc; margin:0; }

  .pitch{
    position:relative;
    width:100%; max-width:820px; height:420px;
    border-radius:20px;
    overflow:hidden;
    background: linear-gradient(180deg, #a3ef74 0%, #82df5a 45%, #5cba3f 100%);
    box-shadow: 0 20px 50px rgba(0,0,0,0.45);
  }
  .stripe{ position:absolute; top:0; bottom:0; width:10%; }
  .stripe.light{ background:rgba(255,255,255,0.12); }
  .stripe.dark{ background:rgba(0,0,0,0.045); }
  .midline{ position:absolute; left:50%; top:20px; bottom:20px; width:3px; background:rgba(255,255,255,0.55); }
  .centercircle{
    position:absolute; left:50%; top:50%; width:140px; height:140px;
    margin:-70px 0 0 -70px; border-radius:50%;
    border:3px solid rgba(255,255,255,0.55);
  }

  .bubble{
    position:absolute;
    width:110px; height:110px;
    border-radius:50%;
    box-shadow:
      0 8px 16px rgba(0,0,0,0.35),
      inset 0 -10px 16px rgba(0,0,0,0.16),
      inset 0 6px 12px rgba(255,255,255,0.55);
    overflow:hidden;
  }
  .bubble.team-a{
    top:150px; left:110px;
    border: 3px solid rgba(90,180,255,0.5);
    background: radial-gradient(circle at 34% 28%, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.15) 30%, rgba(88,178,247,0.24) 60%, rgba(63,169,245,0.36) 100%);
  }
  .bubble.team-b{
    top:150px; right:110px;
    border: 3px solid rgba(255,110,125,0.5);
    background: radial-gradient(circle at 34% 28%, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.15) 30%, rgba(247,120,135,0.24) 60%, rgba(245,86,107,0.36) 100%);
  }
  .bubble img{
    position:absolute;
    width:88%; height:88%; top:6%; left:6%;
    object-fit:contain;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,0.4));
  }
  .shine{
    position:absolute;
    top:10%; left:20%;
    width:34%; height:18%;
    background:rgba(255,255,255,0.8);
    border-radius:50%;
    transform:rotate(-25deg);
    filter: blur(1.5px);
  }
  .shine.small{
    top:66%; left:60%;
    width:12%; height:8%;
    background:rgba(255,255,255,0.55);
    transform:rotate(10deg);
  }

  .legend{ display:flex; gap:40px; font-size:12px; color:#9fb8bc; }
</style>
</head>
